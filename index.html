<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans">

  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [coins, setCoins] = React.useState([]);
      const [loading, setLoading] = React.useState(true);

      const fetchCryptoData = async () => {
        try {
          const response = await fetch(
            'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1&sparkline=false'
          );
          const data = await response.json();
          setCoins(data);
          setLoading(false);
        } catch (error) {
          console.error("Error fetching data:", error);
          setLoading(false);
        }
      };

      React.useEffect(() => {
        fetchCryptoData();
        const interval = setInterval(fetchCryptoData, 60000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="min-h-screen p-6">
          <div className="max-w-xl mx-auto">
            <header className="mb-6 flex justify-between items-center">
              <h1 className="text-2xl font-black text-yellow-400">Crypto Dashboard</h1>
              <span className="px-3 py-1 bg-gray-800 text-xs text-green-400 rounded-full animate-pulse">● Live</span>
            </header>

            {loading ? (
              <p className="text-center text-gray-500 mt-10">Loading Market Data...</p>
            ) : (
              <div className="space-y-3">
                {coins.map((coin) => {
                  const priceChange = coin.price_change_percentage_24h || 0;
                  const isProfit = priceChange > 0;
                  const currentPrice = coin.current_price || 0;

                  return (
                    <div key={coin.id} className="bg-gray-900 border border-gray-800 p-4 rounded-xl flex items-center justify-between shadow-lg">
                      <div className="flex items-center gap-3">
                        <img src={coin.image} alt={coin.name} className="w-9 h-9" />
                        <div>
                          <h2 className="font-bold text-base leading-tight">{coin.name}</h2>
                          <span className="text-xs text-gray-500 uppercase">{coin.symbol}</span>
                        </div>
                      </div>
                      <div className="text-right">
                        <p className="font-mono font-bold">${currentPrice.toLocaleString()}</p>
                        <p className={`text-xs font-semibold ${isProfit ? 'text-green-400' : 'text-red-400'}`}>
                          {isProfit ? '+' : ''}{priceChange.toFixed(2)}%
                        </p>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    const r = document.getElementById('root');
    ReactDOM.createRoot(r).render(<App />);
  </script>
</body>
</html>
